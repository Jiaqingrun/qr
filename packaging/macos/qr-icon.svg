<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121824"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </linearGradient>
    <linearGradient id="ring" x1="20%" y1="15%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#6ea8fe"/>
      <stop offset="45%" stop-color="#5ad1e0"/>
      <stop offset="100%" stop-color="#7ee0a8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="226" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="192" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>
  <g filter="url(#glow)" transform="translate(512 500)">
    <circle cx="0" cy="0" r="248" fill="none" stroke="url(#ring)" stroke-width="88"
            stroke-linecap="round" stroke-dasharray="1320 420" transform="rotate(-58)"/>
    <circle cx="168" cy="168" r="52" fill="url(#ring)"/>
  </g>
</svg>
